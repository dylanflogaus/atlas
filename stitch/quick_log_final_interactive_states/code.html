<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries">
    const buttons = document.querySelectorAll('.outcome-btn');
    const notesArea = document.getElementById('notes-area');
    const charCount = document.getElementById('char-count');

    // Button states mapping to match requested original unselected vs high-contrast selected
    const states = {
        'not-home': {
            selected: 'bg-slate-700 text-white border-slate-800',
            unselected: 'bg-[#E2E8F0] border-transparent text-slate-700',
            iconSelected: 'text-white',
            iconUnselected: 'text-slate-600'
        },
        'left-lit': {
            selected: 'bg-[#3B82F6] text-white border-[#1D4ED8]',
            unselected: 'bg-white border-[#3B82F6] text-[#3B82F6]',
            iconSelected: 'text-white',
            iconUnselected: 'text-[#3B82F6]'
        },
        'persuasion': {
            selected: 'bg-yellow-500 text-yellow-950 border-yellow-700 border-2',
            unselected: 'bg-[#FEF08A] border-transparent text-yellow-950',
            iconSelected: 'text-yellow-950',
            iconUnselected: 'text-yellow-800'
        },
        'ballot': {
            selected: 'bg-[#9E001F] text-white border-[#410007] shadow-xl ring-2 ring-offset-2 ring-[#C8102E]',
            unselected: 'bg-[#C8102E] text-white border-transparent shadow-sm',
            iconSelected: 'text-white',
            iconUnselected: 'text-white'
        }
    };

    function resetButtons() {
        buttons.forEach(btn => {
            const outcome = btn.dataset.outcome;
            const config = states[outcome];
            const icon = btn.querySelector('.material-symbols-outlined');
            const label = btn.querySelector('span:not(.material-symbols-outlined)');

            // Reset classes
            btn.classList.remove('selected-active');
            btn.classList.remove(...config.selected.split(' '));
            btn.classList.add(...config.unselected.split(' '));
            
            // Reset text and icon colors
            if (label && outcome !== 'ballot') {
                label.classList.remove('text-white');
                label.classList.add(...config.unselected.split(' ').filter(c => c.startsWith('text-')));
            }

            if (icon) {
                icon.style.fontVariationSettings = "'FILL' 0";
                icon.classList.remove(config.iconSelected);
                icon.classList.add(config.iconUnselected);
            }
        });
    }

    buttons.forEach(button => {
        button.addEventListener('click', () => {
            const isAlreadySelected = button.classList.contains('selected-active');
            
            resetButtons();

            if (!isAlreadySelected) {
                const outcome = button.dataset.outcome;
                const config = states[outcome];
                const icon = button.querySelector('.material-symbols-outlined');
                const label = button.querySelector('span:not(.material-symbols-outlined)');

                button.classList.add('selected-active');
                button.classList.remove(...config.unselected.split(' '));
                button.classList.add(...config.selected.split(' '));

                if (icon) {
                    icon.style.fontVariationSettings = "'FILL' 1";
                    icon.classList.remove(config.iconUnselected);
                    icon.classList.add(config.iconSelected);
                }
                if (label) {
                    label.classList.add('text-white');
                    // Keep persuasion text dark even when selected if it looks better, but user asked for high contrast solid fill
                    if (outcome === 'persuasion') label.classList.add('text-yellow-950');
                }
            }
        });
    });

    notesArea.addEventListener('input', () => {
        const length = notesArea.value.length;
        charCount.textContent = `${length} / 150`;
        if (length >= 150) {
            charCount.classList.add('text-error');
        } else {
            charCount.classList.remove('text-error');
        }
    });

    // Initialize
    resetButtons();
</script>
